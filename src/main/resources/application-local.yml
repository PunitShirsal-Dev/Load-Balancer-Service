spring:
  config:
    activate:
      on-profile: local
  cloud:
    discovery:
      client:
        simple:
          instances:
            user-service:
              - uri: http://localhost:8081
                metadata:
                  weight: "8"
              - uri: http://localhost:8086
                metadata:
                  weight: "2"
            product-service:
              - uri: http://localhost:8082
                metadata:
                  weight: "7"
              - uri: http://localhost:8087
                metadata:
                  weight: "3"
            order-service:
              - uri: http://localhost:8083
                metadata:
                  weight: "5"
              - uri: http://localhost:8088
                metadata:
                  weight: "5"
            auth-service:
              - uri: http://localhost:8084
                metadata:
                  weight: "9"
              - uri: http://localhost:8089
                metadata:
                  weight: "1"
            admin-service:
              - uri: http://localhost:8085
                metadata:
                  weight: "6"
              - uri: http://localhost:8091
                metadata:
                  weight: "4"

eureka:
  client:
    enabled: false
